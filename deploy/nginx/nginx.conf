# nginx.conf — reverse proxy for the Risk Analysis Workbench.
# In dev this file is volume-mounted into the linux-box container.
# In production, copy it to /etc/nginx/sites-available/ and symlink.
#
# Ports:
#   80  → HTTP (dev only; add TLS termination block for production)
#   8000 → uvicorn (internal only)

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;

    # ── Buffer tuning for SSE (server-sent events) ─────────────────────────────
    # SSE streams must not be buffered.
    proxy_buffering off;
    proxy_cache off;

    upstream uvicorn {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Static assets — served directly by nginx; never reaches uvicorn.
        location /static/ {
            alias /workspace/app/static/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # SSE endpoint — disable buffering explicitly.
        location /api/events {
            proxy_pass http://uvicorn;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }

        # All other requests → uvicorn.
        location / {
            proxy_pass http://uvicorn;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
