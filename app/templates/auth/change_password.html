<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password · Risk Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/icons/rwb_white.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="signin-body">
  <div class="signin-card">
    <div class="signin-logo"><img src="/static/icons/rwb.svg" alt="Risk Workbench" style="height: 64px; width: auto;"></div>
    <h1 class="signin-title">Set your password</h1>
    <p class="signin-sub">You must set a new password before continuing.</p>

    {% if errors %}
    <div style="margin-bottom: 16px; padding: 10px 14px; background: var(--color-negative-bg); border: 1px solid var(--color-negative-border); border-radius: var(--radius-md); font-size: var(--fs-label); color: var(--color-negative); text-align: left;">
      {% for e in errors %}<div>{{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <div class="signin-backdoor" style="text-align: left;">
      <p class="signin-backdoor__body">Minimum 12 characters. Must include uppercase, lowercase, and a number.</p>
      <form method="post" action="/auth/change-password">
        <input type="hidden" name="csrf_token" value="{{ generate_csrf_token() }}">
        <label class="signin-backdoor__label" for="new_password">NEW PASSWORD</label>
        <input class="signin-backdoor__select" type="password" id="new_password" name="new_password"
               autocomplete="new-password" required>
        <label class="signin-backdoor__label" for="confirm_password" style="margin-top: 8px;">CONFIRM PASSWORD</label>
        <input class="signin-backdoor__select" type="password" id="confirm_password" name="confirm_password"
               autocomplete="new-password" required>
        <button class="signin-backdoor__btn" type="submit" style="margin-top: 8px;">Set password</button>
      </form>
    </div>
  </div>
</body>
</html>
